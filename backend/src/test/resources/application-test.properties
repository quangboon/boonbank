# Test profile overrides — loaded when @ActiveProfiles("test") is set.
# Datasource + Redis are provided by TestcontainersConfiguration via @ServiceConnection,
# so we intentionally do NOT set spring.datasource.* / spring.data.redis.* here.

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# JWT — test secret is >= 32 bytes so JwtStartupValidator (P05) will pass once added.
app.security.jwt.secret=test-secret-must-be-at-least-256-bits-long-do-not-ship-this-1234567890
app.security.jwt.access-token-ttl=PT1H
app.security.jwt.refresh-token-ttl=P7D

# Business timezone (consumed once P04 introduces Clock bean; harmless until then).
app.timezone=Asia/Ho_Chi_Minh

# Keep container boot time quiet.
logging.level.org.testcontainers=INFO
logging.level.com.github.dockerjava=WARN
logging.level.org.hibernate.SQL=WARN
