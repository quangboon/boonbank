spring.application.name=bank

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5437/bbank
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.data.redis.host=localhost
spring.data.redis.port=6389

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:7f3d9a1c4b8e2f6d9c0a3e7b5f1d8a6c2e4f9b1d7a3c5e8f}
app.security.jwt.secondary-secret=${APP_SECURITY_JWT_SECONDARY_SECRET:9c1e7b3a5f2d8a6c4b0e9f1d3a7c5e2b8d6f4a1c3e9b7d2f}
app.security.jwt.min-bytes=32
app.security.jwt.access-token-ttl=PT1H
app.security.jwt.refresh-token-ttl=P7D

app.timezone=Asia/Ho_Chi_Minh


spring.threads.virtual.enabled=true
spring.data.web.pageable.max-page-size=200

# --- Balance tier thresholds (P02 / OQ3) ---
# VND bucketing for statistics endpoints. Override by env var if needed.
app.statistics.balance-tier.high-min=100000000
app.statistics.balance-tier.mid-min=10000000

# --- Report export (P05) ---
# Rows above this → HTTP 400 EXPORT_TOO_LARGE. Set to 0 as runtime kill-switch.
app.report.max-rows=50000
# Async dispatch wall-clock guard (ms). Must be > TransactionConfig#REPORT_TX_TIMEOUT_SECONDS
# (120s = 120000ms) so the tx timeout fires first; this is the container-level fallback if
# tx timeout is silently swallowed by the JDBC driver.
spring.mvc.async.request-timeout=130000

# --- OpenAPI ---
springdoc.swagger-ui.path=/swagger-ui.html

# --- Actuator (P06) ---
# Default exposure intentionally minimal (health + info). Ops override via
# ACTUATOR_EXPOSE_LIST env var; the exclude list below wins even if someone sets
# ACTUATOR_EXPOSE_LIST=* for debugging (defence-in-depth). Each excluded entry is
# a known info-leak surface:
#   env/configprops          → env vars incl. DB creds + JWT secret.
#   beans/mappings           → app topology + endpoint map → targeted probing.
#   heapdump/threaddump      → heap contents + in-flight request stacks.
#   loggers                  → remote log-level mutation (what we DO log).
#   sbom/startup/scheduled.. → library versions (CVE targeting) + bean names.
# show-details=when-authorized: anonymous sees UP/DOWN only; ADMIN sees full detail.
management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE_LIST:health,info}
management.endpoints.web.exposure.exclude=env,beans,configprops,heapdump,threaddump,mappings,loggers,sbom,startup,scheduledtasks
management.endpoint.health.show-details=when-authorized

# --- Fraud: geo anomaly rule (P07) ---
# Disabled by default: a fresh deployment has no location history, so enabling here
# would raise a HIGH-volume batch of false positives. Ops: flip to true only after
# you've ingested enough transactions for each account to have a stable location
# footprint, or in staging to validate alert shape.
app.fraud.geo-anomaly.enabled=false
app.fraud.geo-anomaly.history-size=5
