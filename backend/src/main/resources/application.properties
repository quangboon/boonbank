spring.application.name=bank

# --- Datasource ---
spring.datasource.url=jdbc:postgresql://localhost:5437/bbank
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

spring.data.redis.host=localhost
spring.data.redis.port=6389

app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:7f3d9a1c4b8e2f6d9c0a3e7b5f1d8a6c2e4f9b1d7a3c5e8f}
app.security.jwt.secondary-secret=${APP_SECURITY_JWT_SECONDARY_SECRET:9c1e7b3a5f2d8a6c4b0e9f1d3a7c5e2b8d6f4a1c3e9b7d2f}
app.security.jwt.min-bytes=32
app.security.jwt.access-token-ttl=PT1H
app.security.jwt.refresh-token-ttl=P7D

app.timezone=Asia/Ho_Chi_Minh


spring.threads.virtual.enabled=true
spring.data.web.pageable.max-page-size=200

app.statistics.balance-tier.high-min=100000000
app.statistics.balance-tier.mid-min=10000000

app.report.max-rows=50000
spring.mvc.async.request-timeout=130000
springdoc.swagger-ui.path=/swagger-ui.html

management.endpoints.web.exposure.include=${ACTUATOR_EXPOSE_LIST:health,info}
management.endpoints.web.exposure.exclude=env,beans,configprops,heapdump,threaddump,mappings,loggers,sbom,startup,scheduledtasks
management.endpoint.health.show-details=when-authorized

app.fraud.geo-anomaly.enabled=false
app.fraud.geo-anomaly.history-size=5

spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.auto-startup=true
spring.quartz.wait-for-jobs-to-complete-on-shutdown=true
spring.quartz.overwrite-existing-jobs=false

spring.quartz.properties.org.quartz.scheduler.instanceName=BoonBankScheduler
spring.quartz.properties.org.quartz.scheduler.instanceId=AUTO

spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.PostgreSQLDelegate
spring.quartz.properties.org.quartz.jobStore.tablePrefix=QRTZ_
spring.quartz.properties.org.quartz.jobStore.isClustered=true
spring.quartz.properties.org.quartz.jobStore.clusterCheckinInterval=15000
spring.quartz.properties.org.quartz.jobStore.misfireThreshold=60000
spring.quartz.properties.org.quartz.jobStore.useProperties=true
spring.quartz.properties.org.quartz.threadPool.class=org.quartz.simpl.SimpleThreadPool
spring.quartz.properties.org.quartz.threadPool.threadCount=20
spring.quartz.properties.org.quartz.threadPool.threadPriority=5

spring.datasource.hikari.maximum-pool-size=30

scheduler.legacy.enabled=false
