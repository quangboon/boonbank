spring:
  application:
    name: boon-bank
  threads:
    virtual:
      enabled: true

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:boonbank}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:10}
      minimum-idle: 5
      connection-timeout: 20000

  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false

  flyway:
    enabled: false
    locations: classpath:db/migration

  cache:
    type: redis
    redis:
      time-to-live: 300000
      cache-null-values: false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2000

app:
  jwt:
    secret: ${JWT_SECRET:bBDRvdfzX0du720zU7Y6e706dVoEEdbSNlrmh8lYF4P8EfeQMRER7X2jJIWUx2bUPevj2bSkQ/cg8st7U7aoHA==}
    expiration-ms: ${JWT_EXPIRATION:86400000}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
  fee:
    transfer-rate: ${FEE_TRANSFER:0.0005}
    withdrawal-rate: ${FEE_WITHDRAWAL:0.001}
  fraud:
    large-amount-threshold: ${FRAUD_LARGE_AMOUNT:500000000}
    max-txn-per-hour: ${FRAUD_MAX_TXN_HOUR:10}
  login:
    max-attempts: ${LOGIN_MAX_ATTEMPTS:5}
    lock-duration-minutes: ${LOGIN_LOCK_MINUTES:15}
  account:
    default-txn-limit: ${DEFAULT_TXN_LIMIT:50000000}
  timezone: ${APP_TIMEZONE:Asia/Ho_Chi_Minh}
  transaction:
    min-amount: ${TXN_MIN_AMOUNT:10000}
  stats:
    high-threshold: ${STATS_HIGH_THRESHOLD:100000000}
    low-threshold: ${STATS_LOW_THRESHOLD:10000000}
  rate-limit:
    enabled: true
    global-limit: 1000
    global-window: 1
    ip-limit: 100
    ip-window: 60
    user-limit: 50
    user-window: 60
    admin-limit: 200

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    tags:
      application: boon-banking

logging:
  level:
    com.boon.bank: INFO

springdoc:
  swagger-ui:
    path: /swagger-ui.html
